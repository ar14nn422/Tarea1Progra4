<!DOCTYPE html>
<html>
<head>
    <title>Autores</title>
    <style>
        .Titulo {
            font-weight: bold;
            font-size: 28px;
            color: white;
            text-align: center;
            background-color: cornflowerblue;
            padding: 20px;
        }

        .Autor {
            margin: 40px;
        }

        .EncabezadoAutor {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .Nombre {
            font-size: 22px;
            font-weight: bold;
        }

        .Cargo {
            font-size: 18px;
            color: gray;
        }

        .ContenidoAutor {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .ContenidoAutor img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
        }

        .Descripcion {
            flex: 1;
            background-color: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
            line-height: 1.6;
        }

    </style>
</head>
<body>

<div class="Titulo">AUTORES</div>


<div class="Autor">

    <div class="EncabezadoAutor">
        <div class="Nombre">Suganavesh B</div>
        <div class="Cargo">Senior Software Engineer at Amazon</div>
    </div>

    <div class="ContenidoAutor">
        <img src="images/A1.jpg">

        <div class="Descripcion">
         jjjjjjjj
        </div>
    </div>

</div>

</body>
</html>
